name: Publish to ClawHub

on:
  push:
    tags:
      # chainstream-data@3.0.7, chainstream-graphql@1.0.0, or chainstream-defi@1.0.6
      - "chainstream-data@*"
      - "chainstream-graphql@*"
      - "chainstream-defi@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Parse tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SKILL="${TAG%%@*}"
          VERSION="${TAG##*@}"
          echo "skill=$SKILL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $SKILL@$VERSION"

      - name: Bundle shared docs into skill
        run: |
          SKILL="${{ steps.tag.outputs.skill }}"
          cp -r shared/ "$SKILL/shared/"
          cp README.md "$SKILL/README.project.md" 2>/dev/null || true
          cp CLAUDE.md "$SKILL/CLAUDE.md" 2>/dev/null || true

      - name: Publish to ClawHub
        run: |
          npx clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          npx clawhub publish "./${{ steps.tag.outputs.skill }}" \
            --slug "${{ steps.tag.outputs.skill }}" \
            --version "${{ steps.tag.outputs.version }}"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
